services:
  - type: web
    name: rag-chatbot
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python scripts/build_index.py"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: TOP_K
        value: "4"
      - key: DATABASE_URL
        value: sqlite:///./qna.db
